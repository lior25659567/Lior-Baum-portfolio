* { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0; height: 0; display: none; }
html, body { overflow: hidden; overscroll-behavior: none; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: #F4F7FA;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  svg { width: 100%; height: 100%; display: block; }

  /* Panels dim when inactive, brighten when active — all share a 9s cycle */
  .p1 { animation: p1Active 9s infinite; }
  .p2 { animation: p2Active 9s infinite; }
  .p3 { animation: p3Active 9s infinite; }
  @keyframes p1Active { 0%, 31% { opacity: 1; } 34%, 100% { opacity: 0.42; } }
  @keyframes p2Active { 0%, 30% { opacity: 0.42; } 34%, 63% { opacity: 1; } 67%, 100% { opacity: 0.42; } }
  @keyframes p3Active { 0%, 63% { opacity: 0.42; } 67%, 98% { opacity: 1; } 100% { opacity: 0.42; } }

  /* Active panel border glows cyan */
  .p1 .panel-border { animation: b1 9s infinite; }
  .p2 .panel-border { animation: b2 9s infinite; }
  .p3 .panel-border { animation: b3 9s infinite; }
  @keyframes b1 { 0%, 31% { stroke: #00AED6; stroke-width: 1.5; } 34%, 100% { stroke: #E5E7EB; stroke-width: 0.8; } }
  @keyframes b2 { 0%, 30% { stroke: #E5E7EB; stroke-width: 0.8; } 34%, 63% { stroke: #00AED6; stroke-width: 1.5; } 67%, 100% { stroke: #E5E7EB; stroke-width: 0.8; } }
  @keyframes b3 { 0%, 63% { stroke: #E5E7EB; stroke-width: 0.8; } 67%, 98% { stroke: #00AED6; stroke-width: 1.5; } 100% { stroke: #E5E7EB; stroke-width: 0.8; } }

  /* Stepper pill active overlays */
  .pill-info-on { opacity: 0; animation: pillInfoOn 9s infinite; }
  .pill-scan-on { opacity: 0; animation: pillScanOn 9s infinite; }
  .pill-view-on { opacity: 0; animation: pillViewOn 9s infinite; }
  @keyframes pillInfoOn { 0%, 31% { opacity: 1; } 34%, 100% { opacity: 0; } }
  @keyframes pillScanOn { 0%, 30% { opacity: 0; } 34%, 63% { opacity: 1; } 67%, 100% { opacity: 0; } }
  @keyframes pillViewOn { 0%, 63% { opacity: 0; } 67%, 98% { opacity: 1; } 100% { opacity: 0; } }

  /* Flow dots traveling between panels */
  .dot-a { opacity: 0; animation: dotA 9s infinite; }
  .dot-b { opacity: 0; animation: dotB 9s infinite; }
  @keyframes dotA {
    0%, 26% { transform: translateX(0); opacity: 0; }
    28% { opacity: 1; }
    33% { transform: translateX(40px); opacity: 1; }
    35%, 100% { transform: translateX(40px); opacity: 0; }
  }
  @keyframes dotB {
    0%, 58% { transform: translateX(0); opacity: 0; }
    60% { opacity: 1; }
    65% { transform: translateX(40px); opacity: 1; }
    67%, 100% { transform: translateX(40px); opacity: 0; }
  }

  /* Sub-animations inside each panel */
  .scan-beam { transform-box: fill-box; animation: beamSweep 2.4s infinite ease-in-out; }
  @keyframes beamSweep { 0%, 100% { transform: translateY(0); opacity: 0.25; } 50% { transform: translateY(52px); opacity: 0.95; } }

  .mesh-dot { opacity: 0; animation: dotPop 2.4s infinite; }
  .mesh-dot:nth-child(1) { animation-delay: 0.0s; }
  .mesh-dot:nth-child(2) { animation-delay: 0.15s; }
  .mesh-dot:nth-child(3) { animation-delay: 0.3s; }
  .mesh-dot:nth-child(4) { animation-delay: 0.45s; }
  .mesh-dot:nth-child(5) { animation-delay: 0.6s; }
  .mesh-dot:nth-child(6) { animation-delay: 0.75s; }
  .mesh-dot:nth-child(7) { animation-delay: 0.9s; }
  .mesh-dot:nth-child(8) { animation-delay: 1.05s; }
  .mesh-dot:nth-child(9) { animation-delay: 1.2s; }
  .mesh-dot:nth-child(10) { animation-delay: 1.35s; }
  .mesh-dot:nth-child(11) { animation-delay: 1.5s; }
  .mesh-dot:nth-child(12) { animation-delay: 1.65s; }
  @keyframes dotPop { 0% { opacity: 0; } 20%, 80% { opacity: 0.9; } 100% { opacity: 0; } }

  .tooth-3d { transform-box: fill-box; transform-origin: center; animation: rot3d 8s linear infinite; }
  @keyframes rot3d { to { transform: rotate(360deg); } }

  .tooth-pulse { animation: toothPulse 2s ease-in-out infinite; }
  @keyframes toothPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }

  .progress-fill { animation: fillBar 3s ease-out infinite; transform-origin: left; }
  @keyframes fillBar { 0% { transform: scaleX(0); } 70%, 100% { transform: scaleX(1); } }

  /* Entrance */
  .entrance { opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.22,0.9,0.3,1) forwards; }
  .d1 { animation-delay: 0.15s; }
  .d2 { animation-delay: 0.30s; }
  .d3 { animation-delay: 0.45s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
