<style>
/* scrollbar-hide */
* { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0; height: 0; display: none; }
html, body { overflow: hidden; overscroll-behavior: none; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    min-height: 100vh; min-height: 100dvh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #A8E6E2 0%, #C4EEDA 35%, #B8D8F0 65%, #C8B8F0 100%);
  }
  .stage { width: 100%; height: 100%; }
  .canvas { width: 100%; height: 100%; display: block; }

  /* 2 states × 6s */
  .s1,.s2 { opacity:0; }
  .s1 { animation: s1 12s infinite; }
  .s2 { animation: s2 12s infinite; }
  @keyframes s1 { 0%,46%  { opacity:1 } 50%,100% { opacity:0 } }
  @keyframes s2 { 0%,48%  { opacity:0 } 52%,97%  { opacity:1 } 100%   { opacity:0 } }

  /* Gentle card float */
  .f1 { animation: fy 4s ease-in-out infinite; }
  .f2 { animation: fy 4s ease-in-out infinite; animation-delay:.7s; }
  .f3 { animation: fy 4s ease-in-out infinite; animation-delay:1.3s; }
  @keyframes fy { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  /* Tooth pulse when selected */
  .t-sel { animation: tpulse 2s ease-in-out infinite; }
  .t-sel:nth-child(2){animation-delay:.2s}
  .t-sel:nth-child(3){animation-delay:.4s}
  .t-sel:nth-child(4){animation-delay:.6s}
  @keyframes tpulse { 0%,100%{opacity:.88} 50%{opacity:1} }

  /* Pill pop in sequence */
  .pill { opacity:0; animation: pillPop .5s cubic-bezier(.34,1.56,.64,1) forwards; }
  .p1{animation-delay:.1s} .p2{animation-delay:.25s} .p3{animation-delay:.4s}
  .p4{animation-delay:.55s} .p5{animation-delay:.7s}  .p6{animation-delay:.85s}
  .p7{animation-delay:1.0s} .p8{animation-delay:1.15s} .p9{animation-delay:1.3s}
  @keyframes pillPop { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }

  /* Scan beam sweep */
  .beam { transform-box:fill-box; animation: beamSw 2.2s ease-in-out infinite; }
  @keyframes beamSw { 0%,100%{transform:translateY(-80px);opacity:.4} 50%{transform:translateY(80px);opacity:1} }

  /* Mesh dots */
  .md { animation: mdot 2.2s infinite; }
  .md:nth-child(1){animation-delay:.00s} .md:nth-child(2){animation-delay:.12s}
  .md:nth-child(3){animation-delay:.24s} .md:nth-child(4){animation-delay:.36s}
  .md:nth-child(5){animation-delay:.48s} .md:nth-child(6){animation-delay:.60s}
  .md:nth-child(7){animation-delay:.72s} .md:nth-child(8){animation-delay:.84s}
  .md:nth-child(9){animation-delay:.96s} .md:nth-child(10){animation-delay:1.08s}
  .md:nth-child(11){animation-delay:1.20s}.md:nth-child(12){animation-delay:1.32s}
  @keyframes mdot { 0%,15%{opacity:0} 40%,75%{opacity:1} 100%{opacity:0} }

  /* Progress bar */
  .pfill { transform-box:fill-box; transform-origin:left; animation: pfill 3s ease-out infinite; }
  @keyframes pfill { 0%{transform:scaleX(0)} 80%,100%{transform:scaleX(1)} }

  /* Slide up */
  .slide { animation: slideUp .5s cubic-bezier(.22,.9,.3,1) both; }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  @media (prefers-reduced-motion: reduce) { * { animation:none!important } }
