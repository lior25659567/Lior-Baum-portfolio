<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iTero workflow</title>
<style>
/* scrollbar-hide */
* { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0; height: 0; display: none; }
html, body { overflow: hidden; overscroll-behavior: none; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: #F4F7FA;
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .stage {
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    padding: 0;
    margin: 0;
  }
  .itero-canvas {
    width: 100%;
    max-width: none;
    height: auto;
    display: block;
  }

  /* 12s cycle — four steps: RX · Scan · View · Send (nav) */
  .c1-active, .c2-active, .c3-active { opacity: 0; }
  .c1-active { animation: c1On 12s infinite; }
  .c2-active { animation: c2On 12s infinite; }
  .c3-active { animation: c3On 12s infinite; }
  @keyframes c1On { 0%, 25% { opacity: 1; } 28%, 100% { opacity: 0; } }
  @keyframes c2On { 0%, 24% { opacity: 0; } 25%, 50% { opacity: 1; } 53%, 100% { opacity: 0; } }
  @keyframes c3On { 0%, 49% { opacity: 0; } 50%, 75% { opacity: 1; } 78%, 100% { opacity: 0; } }

  .pill-rx-on, .pill-scan-on, .pill-view-on, .pill-send-on { opacity: 0; }
  .pill-rx-on { animation: pillRx 12s infinite; }
  .pill-scan-on { animation: pillScan 12s infinite; }
  .pill-view-on { animation: pillView 12s infinite; }
  .pill-send-on { animation: pillSend 12s infinite; }
  @keyframes pillRx { 0%, 25% { opacity: 1; } 28%, 100% { opacity: 0; } }
  @keyframes pillScan { 0%, 24% { opacity: 0; } 25%, 50% { opacity: 1; } 53%, 100% { opacity: 0; } }
  @keyframes pillView { 0%, 49% { opacity: 0; } 50%, 75% { opacity: 1; } 78%, 100% { opacity: 0; } }
  @keyframes pillSend { 0%, 74% { opacity: 0; } 75%, 99% { opacity: 1; } 100% { opacity: 0; } }

  .c1 { transform-box: fill-box; animation: lift1 12s infinite; }
  .c2 { transform-box: fill-box; animation: lift2 12s infinite; }
  .c3 { transform-box: fill-box; animation: lift3 12s infinite; }
  @keyframes lift1 { 0%, 25% { transform: translateY(-4px); } 28%, 100% { transform: translateY(0); } }
  @keyframes lift2 { 0%, 24% { transform: translateY(0); } 25%, 50% { transform: translateY(-4px); } 53%, 100% { transform: translateY(0); } }
  @keyframes lift3 { 0%, 49% { transform: translateY(0); } 50%, 75% { transform: translateY(-4px); } 78%, 100% { transform: translateY(0); } }

  .label-1, .label-2, .label-3 { font-weight: 500; }
  .label-1 { animation: lab1 12s infinite; }
  .label-2 { animation: lab2 12s infinite; }
  .label-3 { animation: lab3 12s infinite; }
  @keyframes lab1 { 0%, 25% { fill: #0F2F44; } 28%, 100% { fill: #94A3B8; } }
  @keyframes lab2 { 0%, 24% { fill: #94A3B8; } 25%, 50% { fill: #0F2F44; } 53%, 100% { fill: #94A3B8; } }
  @keyframes lab3 { 0%, 49% { fill: #94A3B8; } 50%, 75% { fill: #0F2F44; } 78%, 100% { fill: #94A3B8; } }

  .dot-a { opacity: 0; animation: dotA 12s infinite; }
  .dot-b { opacity: 0; animation: dotB 12s infinite; }
  @keyframes dotA {
    0%, 20% { transform: translateX(0); opacity: 0; }
    23% { opacity: 1; }
    30% { transform: translateX(100px); opacity: 1; }
    33%, 100% { opacity: 0; }
  }
  @keyframes dotB {
    0%, 45% { transform: translateX(0); opacity: 0; }
    48% { opacity: 1; }
    55% { transform: translateX(100px); opacity: 1; }
    58%, 100% { opacity: 0; }
  }

  .beam-sweep { transform-box: fill-box; animation: beamSw 2.4s infinite ease-in-out; }
  @keyframes beamSw {
    0%, 100% { transform: translateY(-20px); opacity: 0.55; }
    50% { transform: translateY(20px); opacity: 1; }
  }

  .tooth-rotate { transform-box: fill-box; transform-origin: center; animation: rot 8s linear infinite; }
  @keyframes rot { to { transform: rotate(360deg); } }

  .entrance { opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.22,0.9,0.3,1) forwards; }
  .d1 { animation-delay: 0.15s; }
  .d2 { animation-delay: 0.3s; }
  .d3 { animation-delay: 0.45s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
  }
</style>
</head>
<body>
  <div class="stage">
  <svg class="itero-canvas" viewBox="0 0 680 560" preserveAspectRatio="xMinYMin meet" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="iTero workflow: RX, Scan, View, Send">
  <rect x="0" y="0" width="680" height="560" fill="#F4F7FA"/>

  <rect x="0" y="0" width="680" height="64" fill="#FFFFFF"/>
  <line x1="0" y1="64" x2="680" y2="64" stroke="#E5E7EB" stroke-width="0.5"/>

  <text x="28" y="41" font-size="15" font-weight="600" fill="#0F2F44" letter-spacing="-0.4">iTero<tspan font-size="8" dy="-5">™</tspan></text>

  <g class="header-stepper">
  <!-- Spans logo → Send with even spacing before toolbar icons (596+) -->
  <line x1="160" y1="32" x2="246" y2="32" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="296" y1="32" x2="382" y2="32" stroke="#D1D5DB" stroke-width="1"/>
  <line x1="432" y1="32" x2="518" y2="32" stroke="#D1D5DB" stroke-width="1"/>

  <g transform="translate(120, 18)">
    <rect x="0" y="0" width="40" height="28" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <text x="20" y="18" text-anchor="middle" font-size="11" font-weight="500" fill="#6B7280">RX</text>
    <g class="pill-rx-on">
      <rect x="0" y="0" width="40" height="28" rx="14" fill="#00AED6"/>
      <text x="20" y="18" text-anchor="middle" font-size="11" font-weight="500" fill="#FFFFFF">RX</text>
    </g>
  </g>
  <g transform="translate(246, 18)">
    <rect x="0" y="0" width="50" height="28" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <text x="25" y="18" text-anchor="middle" font-size="11" font-weight="500" fill="#6B7280">Scan</text>
    <g class="pill-scan-on">
      <rect x="0" y="0" width="50" height="28" rx="14" fill="#00AED6"/>
      <text x="25" y="18" text-anchor="middle" font-size="11" font-weight="500" fill="#FFFFFF">Scan</text>
    </g>
  </g>
  <g transform="translate(382, 18)">
    <rect x="0" y="0" width="50" height="28" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <text x="25" y="18" text-anchor="middle" font-size="11" font-weight="500" fill="#6B7280">View</text>
    <g class="pill-view-on">
      <rect x="0" y="0" width="50" height="28" rx="14" fill="#00AED6"/>
      <text x="25" y="18" text-anchor="middle" font-size="11" font-weight="500" fill="#FFFFFF">View</text>
    </g>
  </g>
  <g transform="translate(518, 18)">
    <rect x="0" y="0" width="50" height="28" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
    <text x="25" y="18" text-anchor="middle" font-size="11" font-weight="500" fill="#6B7280">Send</text>
    <g class="pill-send-on">
      <rect x="0" y="0" width="50" height="28" rx="14" fill="#00AED6"/>
      <text x="25" y="18" text-anchor="middle" font-size="11" font-weight="500" fill="#FFFFFF">Send</text>
    </g>
  </g>
  </g>

  <g transform="translate(596, 23)" fill="none" stroke="#9CA3AF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="4" width="12" height="10" rx="1.5"/>
    <path d="M 3 4 V 2 Q 3 0 6 0 Q 9 0 9 2 V 4"/>
    <g transform="translate(20, 4)"><rect x="0" y="0" width="16" height="10" rx="1.5"/><rect x="17" y="3" width="2" height="4" fill="#9CA3AF" rx="0.5" stroke="none"/><rect x="1.5" y="1.5" width="9" height="7" rx="0.5" fill="#9CA3AF" stroke="none"/></g>
    <g transform="translate(44, 3)"><path d="M 7 0 V 1 Q 2 1 2 6 V 9 L 0 11 H 14 L 12 9 V 6 Q 12 1 7 1 M 5 12 Q 7 14 9 12"/></g>
    <g transform="translate(64, 4)"><circle cx="6" cy="6" r="2.5"/><path d="M 6 0 V 2 M 6 10 V 12 M 0 6 H 2 M 10 6 H 12"/></g>
  </g>

  <line x1="180" y1="320" x2="500" y2="320" stroke="#E5E7EB" stroke-width="1"/>

  <circle class="dot-a" cx="180" cy="320" r="8" fill="#00AED6" opacity="0.18"/>
  <circle class="dot-a" cx="180" cy="320" r="3.5" fill="#00AED6"/>

  <circle class="dot-b" cx="400" cy="320" r="8" fill="#00AED6" opacity="0.18"/>
  <circle class="dot-b" cx="400" cy="320" r="3.5" fill="#00AED6"/>

  <g class="entrance d1">
    <g class="c1">
      <rect x="60" y="250" width="120" height="120" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.8"/>
      <rect class="c1-active" x="60" y="250" width="120" height="120" rx="14" fill="none" stroke="#00AED6" stroke-width="1.8"/>
      <g transform="translate(120, 310)">
        <path d="M -28 -14 Q -32 -14 -32 -6 L -32 12 Q -30 18 -24 18 L -18 18 Q -12 18 -12 12 L -12 -6 Q -12 -14 -16 -14 Z" fill="#F3F4F6" stroke="#CBD5E1" stroke-width="0.8"/>
        <path d="M -6 -16 Q -9 -16 -9 -6 L -9 14 Q -6 20 0 20 L 6 20 Q 9 20 9 14 L 9 -6 Q 9 -16 6 -16 Z" fill="#E8F5FA" stroke="#00AED6" stroke-width="1.2"/>
        <circle cx="0" cy="2" r="1.6" fill="#00AED6"/>
        <path d="M 16 -14 Q 12 -14 12 -6 L 12 12 Q 14 18 20 18 L 26 18 Q 32 18 32 12 L 32 -6 Q 32 -14 28 -14 Z" fill="#F3F4F6" stroke="#CBD5E1" stroke-width="0.8"/>
      </g>
    </g>
    <text class="label-1" x="120" y="405" text-anchor="middle" font-size="14" letter-spacing="0.2" fill="#94A3B8">RX</text>
  </g>

  <g class="entrance d2">
    <g class="c2">
      <rect x="280" y="250" width="120" height="120" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.8"/>
      <rect class="c2-active" x="280" y="250" width="120" height="120" rx="14" fill="none" stroke="#00AED6" stroke-width="1.8"/>
      <g transform="translate(340, 310)">
        <path d="M -18 -26 Q -24 -26 -24 -12 L -24 18 Q -20 28 -10 28 L 10 28 Q 20 28 24 18 L 24 -12 Q 24 -26 18 -26 L 14 -30 Q 10 -32 6 -30 L -6 -30 Q -10 -32 -14 -30 Z" fill="#F8FAFB" stroke="#94A3B8" stroke-width="1"/>
        <rect class="beam-sweep" x="-34" y="-2" width="68" height="5" fill="#00AED6" opacity="0.22"/>
        <rect class="beam-sweep" x="-34" y="-1" width="68" height="1.5" fill="#00AED6"/>
      </g>
    </g>
    <text class="label-2" x="340" y="405" text-anchor="middle" font-size="14" letter-spacing="0.2" fill="#94A3B8">Scan</text>
  </g>

  <g class="entrance d3">
    <g class="c3">
      <rect x="500" y="250" width="120" height="120" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.8"/>
      <rect class="c3-active" x="500" y="250" width="120" height="120" rx="14" fill="none" stroke="#00AED6" stroke-width="1.8"/>
      <g transform="translate(560, 310)">
        <g class="tooth-rotate">
          <path d="M -18 -26 Q -24 -26 -24 -12 L -24 18 Q -20 28 -10 28 L 10 28 Q 20 28 24 18 L 24 -12 Q 24 -26 18 -26 L 14 -30 Q 10 -32 6 -30 L -6 -30 Q -10 -32 -14 -30 Z" fill="#FFFFFF" stroke="#0F2F44" stroke-width="1.1"/>
          <path d="M -16 -16 Q -8 -14 0 -16 Q 8 -14 16 -16" fill="none" stroke="#CBD5E1" stroke-width="0.7"/>
          <path d="M -20 -2 Q -10 0 0 -2 Q 10 0 20 -2" fill="none" stroke="#CBD5E1" stroke-width="0.7"/>
          <path d="M -18 14 Q -9 16 0 14 Q 9 16 18 14" fill="none" stroke="#CBD5E1" stroke-width="0.7"/>
          <path d="M 14 -30 L 18 -26 Q 24 -26 24 -12 L 24 18 Q 20 28 10 28 L 10 -30 Z" fill="#0F2F44" opacity="0.05"/>
        </g>
      </g>
    </g>
    <text class="label-3" x="560" y="405" text-anchor="middle" font-size="14" letter-spacing="0.2" fill="#94A3B8">View</text>
  </g>
  </svg>
  </div>
</body>
</html>
