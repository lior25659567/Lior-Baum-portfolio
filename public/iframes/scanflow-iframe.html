  html, body {
    width: 100%; height: 100%;
    min-height: 100vh; min-height: 100dvh;

  }
  .stage {
    width: 100%; height: 100%;
    min-height: 100vh; min-height: 100dvh;
    min-height: -webkit-fill-available;
    display: flex; flex-direction: column;
  }
  .canvas { width: 100%; height: 100%; display: block; }

  /* 12s 4-phase cycle */
  .ph1, .ph2, .ph3, .ph4 { opacity: 0; }
  .ph1 { animation: ph1 12s infinite; }
  .ph2 { animation: ph2 12s infinite; }
  .ph3 { animation: ph3 12s infinite; }
  .ph4 { animation: ph4 12s infinite; }
  @keyframes ph1 { 0%, 24% { opacity: 1; } 27%, 100% { opacity: 0; } }
  @keyframes ph2 { 0%, 24% { opacity: 0; } 25%, 49% { opacity: 1; } 52%, 100% { opacity: 0; } }
  @keyframes ph3 { 0%, 49% { opacity: 0; } 50%, 74% { opacity: 1; } 77%, 100% { opacity: 0; } }
  @keyframes ph4 { 0%, 74% { opacity: 0; } 75%, 99% { opacity: 1; } 100% { opacity: 0; } }

  /* Procedure card select pulse */
  .card-sel { animation: selPulse 2s ease-in-out infinite; }
  @keyframes selPulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }

  /* Scan beam sweep */
  .beam { transform-box: fill-box; animation: beamSw 2.2s ease-in-out infinite; }
  @keyframes beamSw { 0%, 100% { transform: translateY(-90px); opacity: 0.4; } 50% { transform: translateY(90px); opacity: 1; } }

  /* Mesh dots pop in */
  .mdot { animation: mdot 2.2s infinite; }
  .mdot:nth-child(1) { animation-delay: 0.0s; }
  .mdot:nth-child(2) { animation-delay: 0.12s; }
  .mdot:nth-child(3) { animation-delay: 0.24s; }
  .mdot:nth-child(4) { animation-delay: 0.36s; }
  .mdot:nth-child(5) { animation-delay: 0.48s; }
  .mdot:nth-child(6) { animation-delay: 0.60s; }
  .mdot:nth-child(7) { animation-delay: 0.72s; }
  .mdot:nth-child(8) { animation-delay: 0.84s; }
  .mdot:nth-child(9) { animation-delay: 0.96s; }
  .mdot:nth-child(10){ animation-delay: 1.08s; }
  .mdot:nth-child(11){ animation-delay: 1.20s; }
  .mdot:nth-child(12){ animation-delay: 1.32s; }
  @keyframes mdot { 0%, 15% { opacity: 0; } 40%, 75% { opacity: 1; } 100% { opacity: 0; } }

  /* Scan progress fill */
  .prog { transform-box: fill-box; transform-origin: left; animation: progFill 3s ease-out infinite; }
  @keyframes progFill { 0% { transform: scaleX(0); } 85%, 100% { transform: scaleX(1); } }

  /* 3D tooth rotation */
  .rot { transform-box: fill-box; transform-origin: center; animation: rot3d 7s linear infinite; }
  @keyframes rot3d { to { transform: rotate(360deg); } }

  .btn-active { animation: btnOn 2s ease-in-out infinite; }
  @keyframes btnOn { 0%, 100% { opacity: 0.9; } 50% { opacity: 1; } }

  .live-dot { animation: livePulse 1.4s ease-in-out infinite; }
  @keyframes livePulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
