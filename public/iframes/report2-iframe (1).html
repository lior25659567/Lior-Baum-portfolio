  /* Template cards pop in cycle-sync */
  .tc1,.tc2,.tc3,.tc4,.tc5 { opacity:0; }
  .tc1 { animation: tc1 13s infinite; }
  .tc2 { animation: tc2 13s infinite; }

  @keyframes tc4 { 0%,10%{opacity:0;transform:scale(.92)} 16%,30%{opacity:1;transform:scale(1)} 34%,100%{opacity:0} }
  @keyframes tc5 { 0%,13%{opacity:0;transform:scale(.92)} 19%,30%{opacity:1;transform:scale(1)} 34%,100%{opacity:0} }

  /* Selected card pulse */
  .sel-pulse { animation: selP 2s ease-in-out infinite; }
  @keyframes selP { 0%,100%{opacity:.88} 50%{opacity:1} }

  /* Sections slide in — cycle-sync */
  .se1,.se2,.se3,.se4,.se5 { opacity:0; }
  .se1 { animation: se1 13s infinite; }
  .se2 { animation: se2drag 13s infinite; }
  .se3 { animation: se3up   13s infinite; }

  @keyframes se4 { 0%,46%{opacity:0;transform:translateY(8px)} 51%,63%{opacity:1;transform:translateY(0)} 67%,100%{opacity:0} }
  @keyframes se5 { 0%,50%{opacity:0;transform:translateY(8px)} 55%,63%{opacity:1;transform:translateY(0)} 67%,100%{opacity:0} }

  @keyframes se2drag {

    43%,55% { opacity:1; transform:translateY(0); filter:none; }

  }

    62%,63% { opacity:1; transform:translateY(-66px); }

  }

  @keyframes ctaP { 0%,100%{opacity:.88} 50%{opacity:1} }

  @media (prefers-reduced-motion: reduce) { * { animation:none!important } }
</style>
