<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand in hand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #f7f9f4;
    min-height: 100vh;
  }
  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }
  .scene {
    width: 100%;
    max-width: 980px;
  }
  svg {
    display: block;
    width: 100%;
    height: auto;
    opacity: 0;
    animation: fadeIn 0.9s ease forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  @media (prefers-reduced-motion: reduce) {
    svg animate, svg animateMotion, svg animateTransform { display: none; }
  }
</style>
</head>
<body>

<div class="scene">
  <svg viewBox="0 0 960 580" preserveAspectRatio="xMidYMid meet"
       role="img"
       aria-label="A designer and Claude travel hand in hand along a sweeping path, leaving a colorful trail and releasing floating sparks of creative output along the way.">

    <defs>
      <linearGradient id="trailGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="#6B5FE8"/>
        <stop offset="33%"  stop-color="#4FA8F0"/>
        <stop offset="66%"  stop-color="#3DCFD3"/>
        <stop offset="100%" stop-color="#D97757"/>
      </linearGradient>
      <radialGradient id="atmosphere" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#B4C0EA" stop-opacity="0.08"/>
        <stop offset="100%" stop-color="#B4C0EA" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Soft atmospheric glow behind everything -->
    <ellipse cx="480" cy="290" rx="480" ry="280" fill="url(#atmosphere)"/>

    <!-- Ambient background dots (faint, suggesting the design canvas) -->
    <g fill="#B4C0EA" opacity="0.22">
      <circle cx="130" cy="120" r="2"/>
      <circle cx="240" cy="60" r="1.5"/>
      <circle cx="90" cy="320" r="1.5"/>
      <circle cx="820" cy="110" r="2"/>
      <circle cx="910" cy="220" r="1.5"/>
      <circle cx="60" cy="480" r="1.5"/>
      <circle cx="870" cy="470" r="2"/>
      <circle cx="430" cy="60" r="1.5"/>
      <circle cx="540" cy="540" r="1.5"/>
      <circle cx="720" cy="540" r="2"/>
    </g>

    <!-- Dashed guide path -->
    <path d="M 80 450 C 220 70 400 500 540 240 C 680 70 820 500 900 230"
          fill="none" stroke="#B4C0EA" stroke-width="1.5"
          stroke-dasharray="6 6" opacity="0.4"/>

    <!-- Wide soft glow trail -->
    <path d="M 80 450 C 220 70 400 500 540 240 C 680 70 820 500 900 230"
          fill="none" stroke="url(#trailGrad)" stroke-width="18"
          stroke-linecap="round" opacity="0.18"
          pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset"
               from="100" to="0" dur="9s"
               repeatCount="indefinite"
               calcMode="spline" keySplines="0.42 0 0.58 1"/>
    </path>

    <!-- Main colored trail -->
    <path d="M 80 450 C 220 70 400 500 540 240 C 680 70 820 500 900 230"
          fill="none" stroke="url(#trailGrad)" stroke-width="4.5"
          stroke-linecap="round"
          pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
      <animate attributeName="stroke-dashoffset"
               from="100" to="0" dur="9s"
               repeatCount="indefinite"
               calcMode="spline" keySplines="0.42 0 0.58 1"/>
    </path>

    <!-- Floating sparks — creative output being born as they pass -->
    <g>
      <circle cx="200" cy="220" r="4.5" fill="#6B5FE8">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" begin="0.4s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="220;110" dur="3.5s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="280" cy="360" r="3" fill="#4FA8F0">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.2s" begin="1.0s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="360;260" dur="3.2s" begin="1.0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="380" cy="450" r="4" fill="#3DCFD3">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.6s" begin="1.7s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="450;340" dur="3.6s" begin="1.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="440" cy="320" r="3.5" fill="#D97757">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.3s" begin="2.4s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="320;210" dur="3.3s" begin="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="560" cy="180" r="5" fill="#6B5FE8">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" begin="3.1s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="180;70" dur="3.5s" begin="3.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="660" cy="370" r="3.5" fill="#4FA8F0">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.2s" begin="3.8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="370;270" dur="3.2s" begin="3.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="740" cy="490" r="4" fill="#3DCFD3">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.4s" begin="4.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="490;380" dur="3.4s" begin="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="820" cy="300" r="3" fill="#D97757">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" begin="5.2s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="300;190" dur="3.5s" begin="5.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="880" cy="140" r="4" fill="#6B5FE8">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.3s" begin="5.9s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="140;50" dur="3.3s" begin="5.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="140" cy="500" r="3" fill="#4FA8F0">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.6s" begin="6.6s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="500;400" dur="3.6s" begin="6.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- The pair: designer + Claude hand in hand -->
    <g>
      <!-- Joined hands line (bridge between them) -->
      <line x1="-24" y1="0" x2="24" y2="0"
            stroke="#8FA0DC" stroke-width="2.2"
            stroke-linecap="round" opacity="0.85"/>

      <!-- Designer orb -->
      <circle cx="-28" cy="0" r="20" fill="#ffffff"
              stroke="#B4C0EA" stroke-width="1.8"/>
      <!-- person silhouette (head + shoulders) -->
      <circle cx="-28" cy="-5" r="5" fill="#8FA0DC"/>
      <path d="M -37 6 Q -28 0 -19 6 L -19 12 L -37 12 Z" fill="#8FA0DC"/>

      <!-- Claude orb -->
      <circle cx="28" cy="0" r="22" fill="#F0E2D4"/>
      <path transform="translate(28 0) scale(0.8)"
            d="M0 -12 L2.4 -2.4 L12 0 L2.4 2.4 L0 12 L-2.4 2.4 L-12 0 L-2.4 -2.4 Z"
            fill="#D97757"/>

      <!-- Layered pulsing halos on Claude -->
      <circle cx="28" cy="0" r="22" fill="none"
              stroke="#D97757" stroke-width="1.8">
        <animate attributeName="r" values="22;44" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="28" cy="0" r="22" fill="none"
              stroke="#D97757" stroke-width="1.5">
        <animate attributeName="r" values="22;44" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      </circle>

      <!-- The shared journey -->
      <animateMotion dur="9s" repeatCount="indefinite"
                     calcMode="spline" keySplines="0.42 0 0.58 1"
                     path="M 80 450 C 220 70 400 500 540 240 C 680 70 820 500 900 230"/>
    </g>

  </svg>
</div>

</body>
</html>
