<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* scrollbar-hide */
* { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0; height: 0; display: none; }
html, body { overflow: hidden; overscroll-behavior: none; }

  :root {
    --bg: #f7f9f4;
    --card: #ffffff;
    --fg: #1A1815;
    --fg-2: #595552;
    --lav: #B4C0EA;
    --lav-strong: #8FA0DC;
    --coral-deep: #712B13;
    --coral-soft: #F0E2D4;

    /* .arch uses 1fr : 1.5fr : 1fr + column-gap; SVG paths use ~28.6 / 71.4. */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); }
  body {
    color: var(--fg);
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* Vertical padding shrinks in short iframes via vh term; horizontal stays vw-based. */
    padding: clamp(10px, min(3vw, 3.5vh), 36px) clamp(12px, 2.4vw, 26px);
    min-height: 100vh;
    display: flex;
    /* `safe center` = center vertically if content fits, else fall back to flex-start
       so the TOP of the diagram is visible (no clipping from both sides). */
    align-items: safe center;
    justify-content: center;
  }

  .wrap {
    width: 100%;
    max-width: 1180px;
    margin: 0 auto;
    /* If the iframe is narrower than labels need, scroll instead of breaking words. */
    overflow-x: auto;
    overflow-y: visible;
  }

  /* Percent-based columns so the SVG endpoint (72% from left) always matches
     the Claude card left edge. */
  .arch {
    position: relative;
    display: grid;
    /* Explicit gap between Design Tokens (left col) and Claude card (right col) */
    column-gap: clamp(26px, 5.2vw, 58px);
    row-gap: 0;
    /* Outer cols sized to content so labels can stay single-line (nowrap). */
    grid-template-columns: minmax(min-content, 1fr) minmax(0, 1.5fr) minmax(min-content, 1fr);
    align-items: center;
    max-width: 1260px;
    margin: 0 auto;
    min-height: clamp(260px, min(52vw, 72vh), 510px);
  }

  .col-left {
    display: flex;
    flex-direction: column;
    gap: clamp(14px, 1.85vw, 22px);
    z-index: 1;
  }

  .col-right {
    z-index: 1;
    width: 100%;
    display: flex;
    justify-content: flex-end;
    /* Extra inset so Claude card doesn’t hug the middle column edge */
    padding-left: clamp(6px, 1.2vw, 16px);
  }
  .col-right .card { width: 100%; }

  /* ── Connectors span the whole arch as a background layer.
        viewBox 0-100 means path coords are percentages of the arch area.
        Left col ends at 28% → lines start at x=28.
        Right col starts at 72% → lines end at x=72 (= Claude card left edge). */
  .connectors {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: visible;
    clip-path: inset(0 100% 0 0);
    animation: drawReveal 1.1s cubic-bezier(0.55,0.15,0.35,1) 0.75s forwards;
  }
  .connectors path {
    stroke: var(--lav);
    stroke-width: 1.85;
    stroke-dasharray: 6 6;
    fill: none;
    stroke-linecap: round;
    vector-effect: non-scaling-stroke;
    /* Continuous dash flow = data streaming toward Claude. */
    animation: dashFlow 1.4s linear infinite;
  }
  @keyframes drawReveal { to { clip-path: inset(0 0 0 0); } }
  @keyframes dashFlow { to { stroke-dashoffset: -24; } }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1.5px solid var(--lav);
    border-radius: clamp(12px, 1.85vw, 24px);
    padding: clamp(12px, 1.9vw, 24px) clamp(12px, 2.2vw, 28px);
    display: flex;
    align-items: center;
    gap: clamp(10px, 1.65vw, 20px);
    position: relative;
    opacity: 0;
    transform: translateY(16px) scale(0.97);
    animation: cardIn 0.65s cubic-bezier(0.22,0.9,0.3,1) forwards;
    transition: transform 0.3s cubic-bezier(0.22,0.9,0.3,1), box-shadow 0.3s, border-color 0.3s;
    min-height: clamp(52px, min(9vw, 12vh), 104px);
    min-width: min-content;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px -10px rgba(80, 95, 170, 0.22);
    border-color: var(--lav-strong);
  }

  .card.c1 { animation-delay: 0.15s; }
  .card.c2 { animation-delay: 0.27s; }
  .card.c3 { animation-delay: 0.39s; }
  .card.c4 { animation-delay: 0.58s; }

  @keyframes cardIn { to { opacity: 1; transform: translateY(0) scale(1); } }

  .card .ico {
    width: clamp(32px, 5vw, 60px);
    height: clamp(32px, 5vw, 60px);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card .ico svg { width: 90%; height: 90%; }

  .card .label {
    font-size: clamp(14px, 1.75vw, 23px);
    font-weight: 500;
    color: var(--fg);
    line-height: 1.25;
    white-space: nowrap;
    word-break: normal;
    overflow-wrap: normal;
    min-width: min-content;
  }

  .card.big {
    flex-direction: column;
    align-items: stretch;
    padding: clamp(14px, 2.1vw, 28px) clamp(14px, 2.35vw, 32px);
    min-height: clamp(110px, min(23vw, 32vh), 246px);
    gap: clamp(10px, 1.65vw, 20px);
  }
  .card.big .tokens-viz {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: clamp(10px, 1.45vw, 16px);
    flex: 1;
  }
  .tokens-bars {
    display: flex;
    flex-direction: column;
    gap: clamp(6px, 1.15vw, 14px);
    flex: 1;
    max-width: 176px;
    min-width: 0;
  }
  .tokens-bars .bar { height: clamp(4px, 0.7vw, 8px); border-radius: 4px; }
  .tokens-bars .bar.b1 { background: #6B5FE8; width: 55%; }
  .tokens-bars .bar.b2 { background: #4FA8F0; width: 80%; }
  .tokens-bars .bar.b3 { background: #3DCFD3; width: 48%; }
  .tokens-bars .bar.b4 { background: #D8DBE0; width: 35%; }
  .tokens-graph { width: clamp(56px, 10.5vw, 132px); height: auto; flex-shrink: 0; }

  .card .ico-sq {
    width: clamp(32px, 5vw, 60px);
    height: clamp(32px, 5vw, 60px);
    background: var(--coral-soft);
    border-radius: clamp(8px, 1.25vw, 13px);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .card .ico-sq svg {
    width: 60%;
    height: 60%;
    animation: starSpin 9s linear infinite;
    transform-origin: 50% 50%;
  }
  /* Soft halo radiating out from the Claude card — signals "convergence point". */
  .card.c4 .ico-sq::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: inherit;
    background: radial-gradient(closest-side, rgba(217,119,87,0.45), rgba(217,119,87,0) 70%);
    animation: haloPulse 2.4s ease-in-out infinite;
    pointer-events: none;
    z-index: -1;
  }
  @keyframes starSpin { to { transform: rotate(360deg); } }
  @keyframes haloPulse {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50%      { opacity: 0.95; transform: scale(1.18); }
  }

  /* Idle bob on left-column icons — subtle lift cycle, staggered per card. */
  .card.c1 .ico, .card.c3 .ico { animation: iconBob 4.2s ease-in-out infinite; }
  .card.c3 .ico { animation-delay: 1.4s; }
  @keyframes iconBob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }

  /* Design-tokens bars breathe slightly — looks like values being re-resolved. */
  .tokens-bars .bar { transform-origin: left center; animation: barPulse 3.2s ease-in-out infinite; }
  .tokens-bars .bar.b1 { animation-delay: 0s; }
  .tokens-bars .bar.b2 { animation-delay: 0.3s; }
  .tokens-bars .bar.b3 { animation-delay: 0.6s; }
  .tokens-bars .bar.b4 { animation-delay: 0.9s; }
  @keyframes barPulse {
    0%, 100% { transform: scaleX(1); opacity: 1; }
    50%      { transform: scaleX(0.92); opacity: 0.78; }
  }

  /* Token graph nodes softly pulse so the graphic reads as alive, not static. */
  .tokens-graph circle { transform-origin: center; transform-box: fill-box; animation: nodePulse 2.6s ease-in-out infinite; }
  .tokens-graph circle:nth-of-type(1) { animation-delay: 0s; }
  .tokens-graph circle:nth-of-type(2) { animation-delay: 0.4s; }
  .tokens-graph circle:nth-of-type(3) { animation-delay: 0.8s; }
  .tokens-graph circle:nth-of-type(4) { animation-delay: 1.2s; }
  .tokens-graph circle:nth-of-type(5) { animation-delay: 1.6s; }
  @keyframes nodePulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.12); }
  }

  /* Stack only at phone widths (far below a 50/50 split) */
  @media (max-width: 340px) {
    body { padding: 16px 12px; }
    .arch {
      grid-template-columns: 1fr;
      gap: 12px;
      min-height: auto;
    }
    .connectors { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01s !important; transition-duration: 0.01s !important; }
    .connectors { clip-path: none !important; }
  }
</style>
</head>
<body>
<main class="wrap">

  <div class="arch">

    <!-- Connector layer: viewBox 0-100. x≈28.6 / 71.4 match 1fr : 1.5fr : 1fr split. -->
    <svg class="connectors" viewBox="0 0 100 100" preserveAspectRatio="none">
      <!-- Storybook → Claude -->
      <path d="M 28.6 12 C 50 12, 50 50, 71.4 50"/>
      <!-- Design Tokens → Claude (straight) -->
      <path d="M 28.6 50 L 71.4 50"/>
      <!-- Product surfaces → Claude -->
      <path d="M 28.6 88 C 50 88, 50 50, 71.4 50"/>
    </svg>

    <div class="col-left">
      <div class="card c1">
        <div class="ico">
          <svg width="40" height="40" viewBox="0 0 40 40"><rect width="40" height="40" rx="8" fill="#FF4785"/><text x="20" y="28" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="Arial,sans-serif">S</text></svg>
        </div>
        <div class="label">Storybook</div>
      </div>

      <div class="card big c2">
        <div class="label">Design Tokens</div>
        <div class="tokens-viz">
          <div class="tokens-bars">
            <div class="bar b1"></div>
            <div class="bar b2"></div>
            <div class="bar b3"></div>
            <div class="bar b4"></div>
          </div>
          <svg class="tokens-graph" viewBox="0 0 104 104" fill="none">
            <line x1="28" y1="28" x2="66" y2="28" stroke="#6B5FE8" stroke-width="1.5"/>
            <line x1="28" y1="28" x2="28" y2="68" stroke="#6B5FE8" stroke-width="1.5"/>
            <line x1="66" y1="28" x2="66" y2="68" stroke="#6B5FE8" stroke-width="1.5"/>
            <line x1="28" y1="68" x2="66" y2="68" stroke="#6B5FE8" stroke-width="1.5"/>
            <line x1="28" y1="68" x2="16" y2="86" stroke="#6B5FE8" stroke-width="1.5"/>
            <circle cx="28" cy="28" r="5.5" fill="#4FA8F0"/>
            <circle cx="66" cy="28" r="7" fill="#3DCFD3"/>
            <circle cx="66" cy="68" r="11" fill="#3DCFD3"/>
            <circle cx="28" cy="68" r="6.5" fill="#6B5FE8"/>
            <circle cx="16" cy="88" r="7.5" fill="#4FA8F0"/>
          </svg>
        </div>
      </div>

      <div class="card c3">
        <div class="ico">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="#3D3A9E" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round">
            <path d="M20 5 L34 13 L34 28 L20 36 L6 28 L6 13 Z"/>
            <path d="M20 5 L20 20"/>
            <path d="M6 13 L20 20"/>
            <path d="M34 13 L20 20"/>
          </svg>
        </div>
        <div class="label">Product surfaces</div>
      </div>
    </div>

    <div class="col-right">
      <div class="card c4">
        <div class="ico-sq">
          <svg width="26" height="26" viewBox="-14 -14 28 28"><path d="M0 -12 L2.4 -2.4 L12 0 L2.4 2.4 L0 12 L-2.4 2.4 L-12 0 L-2.4 -2.4 Z" fill="#D97757"/></svg>
        </div>
        <div class="label">Claude / AI Rule</div>
      </div>
    </div>

  </div>

</main>
</body>
</html>
