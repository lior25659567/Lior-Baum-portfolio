<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RX · Scan · View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2eb;
    --fg: #1a1815;
    /* Case study accent */
    --a1: #e8847c;
    --a2: #c96b63;
    --a-glow: rgba(232, 132, 124, 0.35);
    --card: #fff;
    --ink: #2a2622;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { background: var(--bg); }

  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding: clamp(12px, 2.5vh, 28px) clamp(10px, 2vw, 20px);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .wrap {
    width: 100%;
    max-width: 640px;
    position: relative;
  }

  /* Ambient */
  .wrap::before {
    content: '';
    position: absolute;
    inset: -20% -10% -10% -10%;
    background:
      radial-gradient(ellipse 70% 50% at 15% 45%, var(--a-glow), transparent 55%),
      radial-gradient(ellipse 60% 45% at 85% 55%, rgba(201, 107, 99, 0.2), transparent 50%),
      radial-gradient(ellipse 50% 40% at 50% 100%, rgba(232, 132, 124, 0.12), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .flow {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    gap: clamp(4px, 1.2vw, 12px);
  }

  .node {
    flex: 1 1 0;
    min-width: 0;
    max-width: 200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.65rem;
    opacity: 0;
    transform: translateY(12px) scale(0.96);
    animation: pop 0.7s cubic-bezier(0.22, 0.9, 0.3, 1) forwards;
  }
  .node.n1 { animation-delay: 0.1s; }
  .node.n2 { animation-delay: 0.22s; }
  .node.n3 { animation-delay: 0.34s; }

  .icon-ring {
    width: clamp(72px, 18vw, 108px);
    height: clamp(72px, 18vw, 108px);
    border-radius: 24%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--card);
    box-shadow:
      0 0 0 1px rgba(26, 24, 21, 0.06),
      0 8px 28px -6px rgba(26, 24, 21, 0.12),
      0 0 0 0 var(--a-glow);
    transition: transform 0.35s cubic-bezier(0.22, 0.9, 0.3, 1), box-shadow 0.35s;
  }
  .node:hover .icon-ring {
    transform: translateY(-3px) scale(1.02);
    box-shadow:
      0 0 0 1px rgba(232, 132, 124, 0.35),
      0 14px 36px -8px rgba(201, 107, 99, 0.28);
  }

  .icon-ring svg {
    width: 46%;
    height: 46%;
    color: var(--a2);
  }
  .n2 .icon-ring { background: linear-gradient(145deg, #fff 0%, #fff8f6 100%); }
  .n2 .icon-ring svg { color: var(--a1); }

  .label {
    font-size: clamp(0.7rem, 1.5vw, 0.8rem);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink);
  }

  /* Connectors: gradient pipe + chevron */
  .bridge {
    flex: 0 0 clamp(20px, 5vw, 40px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--a1);
    opacity: 0;
    animation: pop 0.55s ease-out 0.5s forwards;
  }
  .bridge svg { width: 100%; max-width: 36px; height: auto; }

  .bridge path.dash {
    stroke-dasharray: 6 5;
    animation: flow 1.8s linear infinite;
  }
  @keyframes flow {
    to { stroke-dashoffset: -22; }
  }

  @keyframes pop {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 480px) {
    .flow {
      flex-direction: column;
      gap: 0;
    }
    .bridge {
      width: 100%;
      min-height: 1.2rem;
      padding: 0.2rem 0;
    }
    .bridge svg {
      max-width: 20px;
      transform: rotate(90deg);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .node, .bridge { animation: none; opacity: 1; transform: none; }
    .bridge path.dash { animation: none; }
  }
</style>
</head>
<body>
<main class="wrap">
  <div class="flow" role="list">
    <div class="node n1" role="listitem">
      <div class="icon-ring" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="8" width="28" height="34" rx="4" stroke="currentColor" stroke-width="2.2" />
          <path d="M16 16h16M16 22h12M16 28h10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" opacity="0.55"/>
          <path d="M20 35l2.5 2.5L30 30" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="label">RX</span>
    </div>

    <div class="bridge" aria-hidden="true">
      <svg viewBox="0 0 40 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line class="dash" x1="2" y1="10" x2="28" y2="10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M32 4l5 6-5 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="node n2" role="listitem">
      <div class="icon-ring" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 32c0-8 5.5-18 16-20 10.5 2 16 12 16 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M12 20c2-3 5-5 8-5.5M32 20c-2-3-4.5-5-8-5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
          <path d="M9 20h5l2 2h20l2-2h5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
          <path d="M20 12l-3 3M25 9l-1.5 4M30 12l-2.5 2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
        </svg>
      </div>
      <span class="label">Scan</span>
    </div>

    <div class="bridge" aria-hidden="true">
      <svg viewBox="0 0 40 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line class="dash" x1="2" y1="10" x2="28" y2="10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M32 4l5 6-5 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="node n3" role="listitem">
      <div class="icon-ring" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="10" width="32" height="24" rx="3" stroke="currentColor" stroke-width="2.2" />
          <path d="M8 16h32" stroke="currentColor" stroke-width="1.2" opacity="0.3"/>
          <path d="M19 30l3.2 3.2L32 25" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="label">View</span>
    </div>
  </div>
</main>
</body>
</html>
