<style>
/* scrollbar-hide */
* { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0; height: 0; display: none; }
html, body { overflow: hidden; overscroll-behavior: none; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;

  .stage { width: 100%; height: 100%; }

  /* 2 states — faster cycle */
  .s1,.s2,.s3 { opacity:0; }
  .s1 { animation: s1 10s infinite; }
  .s2 { animation: s2 10s infinite; }
  @keyframes s1 { 0%,44%  { opacity:1 } 47%,100% { opacity:0 } }
  @keyframes s2 { 0%,46%  { opacity:0 } 49%,97%  { opacity:1 } 100%   { opacity:0 } }

  .f1 { animation: fy 4s ease-in-out infinite; }
  .f2 { animation: fy 4s ease-in-out infinite; animation-delay:.8s; }
  @keyframes fy { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  /* Template cards pop in cycle-sync */
  .tc1,.tc2,.tc3,.tc4,.tc5 { opacity:0; }
  .tc1 { animation: tc1 10s infinite; }
  .tc2 { animation: tc2 10s infinite; }
  .tc3 { animation: tc3 10s infinite; }
  .tc4 { animation: tc4 10s infinite; }
  .tc5 { animation: tc5 10s infinite; }
  @keyframes tc1 { 0%,1%{opacity:0;transform:scale(.92)} 7%,44%{opacity:1;transform:scale(1)} 47%,100%{opacity:0} }
  @keyframes tc2 { 0%,4%{opacity:0;transform:scale(.92)} 10%,44%{opacity:1;transform:scale(1)} 47%,100%{opacity:0} }
  @keyframes tc3 { 0%,7%{opacity:0;transform:scale(.92)} 13%,44%{opacity:1;transform:scale(1)} 47%,100%{opacity:0} }
  @keyframes tc4 { 0%,10%{opacity:0;transform:scale(.92)} 16%,44%{opacity:1;transform:scale(1)} 47%,100%{opacity:0} }
  @keyframes tc5 { 0%,13%{opacity:0;transform:scale(.92)} 19%,44%{opacity:1;transform:scale(1)} 47%,100%{opacity:0} }

  /* Selected card pulse */
  .sel-pulse { animation: selP 2s ease-in-out infinite; }
  @keyframes selP { 0%,100%{opacity:.88} 50%{opacity:1} }

  /* Sections slide in — cycle-sync */
  .se1,.se2,.se3,.se4,.se5 { opacity:0; }
  .se1 { animation: se1 10s infinite; }
  .se2 { animation: se2drag 10s infinite; }
  .se3 { animation: se3up   10s infinite; }
  .se4 { animation: se4 10s infinite; }
  .se5 { animation: se5 10s infinite; }
  @keyframes se1 { 0%,48%{opacity:0;transform:translateY(8px)} 52%,96%{opacity:1;transform:translateY(0)} 100%{opacity:0} }
  @keyframes se4 { 0%,54%{opacity:0;transform:translateY(8px)} 58%,96%{opacity:1;transform:translateY(0)} 100%{opacity:0} }
  @keyframes se5 { 0%,57%{opacity:0;transform:translateY(8px)} 61%,96%{opacity:1;transform:translateY(0)} 100%{opacity:0} }

  @keyframes se2drag {
    0%,50%  { opacity:0; transform:translateY(8px); }
    54%,70% { opacity:1; transform:translateY(0); filter:none; }
    73%     { opacity:1; transform:translateY(-6px) scale(1.015); filter:drop-shadow(0 10px 20px rgba(0,0,0,.13)); }

    78%,80% { opacity:1; transform:translateY(-66px); }
    83%,100%{ opacity:0; transform:translateY(-66px); }

  .pin-on  { animation: pinOn  13s infinite; }

  @keyframes ctaP { 0%,100%{opacity:.88} 50%{opacity:1} }

  .email-cursor { animation: blink .9s steps(2) infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  @media (prefers-reduced-motion: reduce) { * { animation:none!important } }
