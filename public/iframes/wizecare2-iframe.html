<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    min-height: 100vh; min-height: 100dvh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #A8E6E2 0%, #C4EEDA 35%, #B8D8F0 65%, #C8B8F0 100%);
  }
  .stage { width: 100%; height: 100%; }
  .canvas { width: 100%; height: 100%; display: block; }

  /* 2 states — 10s */
  .s1,.s2 { opacity:0; }
  .s1 { animation: s1 10s infinite; }
  .s2 { animation: s2 10s infinite; }
  @keyframes s1 { 0%,44% { opacity:1 } 48%,100% { opacity:0 } }
  @keyframes s2 { 0%,46% { opacity:0 } 50%,97%  { opacity:1 } 100% { opacity:0 } }

  /* Card float */
  .f1 { animation: fy 4s ease-in-out infinite; }
  .f2 { animation: fy 4s ease-in-out infinite; animation-delay:.7s; }
  .f3 { animation: fy 4s ease-in-out infinite; animation-delay:1.4s; }
  .f4 { animation: fy 4s ease-in-out infinite; animation-delay:2.1s; }
  @keyframes fy { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  /* Patient cards pop in */
  .pc1,.pc2,.pc3,.pc4 { opacity:0; }
  .pc1 { animation: pc1 10s infinite; }
  .pc2 { animation: pc2 10s infinite; }
  .pc3 { animation: pc3 10s infinite; }
  .pc4 { animation: pc4 10s infinite; }
  @keyframes pc1 { 0%,1%{opacity:0;transform:scale(.92)} 6%,44%{opacity:1;transform:scale(1)} 48%,100%{opacity:0} }
  @keyframes pc2 { 0%,4%{opacity:0;transform:scale(.92)} 9%,44%{opacity:1;transform:scale(1)} 48%,100%{opacity:0} }
  @keyframes pc3 { 0%,7%{opacity:0;transform:scale(.92)} 12%,44%{opacity:1;transform:scale(1)} 48%,100%{opacity:0} }
  @keyframes pc4 { 0%,10%{opacity:0;transform:scale(.92)} 15%,44%{opacity:1;transform:scale(1)} 48%,100%{opacity:0} }

  /* Circular gauge fill — animate stroke-dashoffset */
  /* Circumference of r=38: 2π×38 ≈ 239 */
  .g1 { animation: g1 10s infinite; }
  .g2 { animation: g2 10s infinite; }
  .g3 { animation: g3 10s infinite; }
  .g4 { animation: g4 10s infinite; }
  /* 67% → offset = 239*(1-.67) = 78.9 */
  @keyframes g1 { 0%,5%{stroke-dashoffset:239} 30%,44%{stroke-dashoffset:79} 48%,100%{stroke-dashoffset:239} }
  /* 75% → offset = 239*(1-.75) = 59.75 */
  @keyframes g2 { 0%,7%{stroke-dashoffset:239} 32%,44%{stroke-dashoffset:60} 48%,100%{stroke-dashoffset:239} }
  /* 36% → offset = 239*(1-.36) = 152.9 */
  @keyframes g3 { 0%,9%{stroke-dashoffset:239} 34%,44%{stroke-dashoffset:153} 48%,100%{stroke-dashoffset:239} }
  /* 96% → offset = 239*(1-.96) = 9.6 */
  @keyframes g4 { 0%,11%{stroke-dashoffset:239} 36%,44%{stroke-dashoffset:10} 48%,100%{stroke-dashoffset:239} }

  /* Exercise card slide */
  .ex-card { animation: exIn 10s infinite; }
  @keyframes exIn { 0%,53%{opacity:0;transform:translateY(10px)} 58%,97%{opacity:1;transform:translateY(0)} 100%{opacity:0} }

  /* Sets +/- counter animate */
  .count-up { animation: countUp 10s infinite; }
  @keyframes countUp { 0%,55%{opacity:0} 60%,97%{opacity:1} 100%{opacity:0} }

  @media (prefers-reduced-motion: reduce) { * { animation:none!important } }
</style>
