<style>
  /* Pin the document shell so the inline iframe below can fill the
     wrapper iframe perfectly. Without this, the browser's implicit body
     margin (~8px) + auto height would let the inline iframe overflow,
     surfacing a scrollbar on the outer wrapper. */
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #EC7E5C;
  }
</style>
</head>

<style>
/* scrollbar-hide */
* { scrollbar-width: none; -ms-overflow-style: none; }
*::-webkit-scrollbar { width: 0; height: 0; display: none; }
html, body { overflow: hidden; overscroll-behavior: none; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    min-height: 100vh;
    background: #EC7E5C;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(16px, 3vmin, 32px);
    position: relative;
  }

  /* Corner bursts — anchored to the iframe corners via CSS so they always
     sit at the visible edges regardless of how tall the iframe grows. */
  .corner-burst {
    position: absolute;
    width: clamp(80px, 11vmin, 140px);
    aspect-ratio: 1;
    pointer-events: none;
    opacity: 0.9;
    animation: spin 28s linear infinite;
    transform-origin: center;
  }
  .corner-burst svg { width: 100%; height: 100%; display: block; }
  .corner-burst.tl { top: 2vmin;    left: 2vmin; }
  .corner-burst.tr { top: 2vmin;    right: 2vmin;  animation-duration: 34s; animation-direction: reverse; }
  .corner-burst.bl { bottom: 2vmin; left: 2vmin;   animation-duration: 40s; }
  .corner-burst.br { bottom: 2vmin; right: 2vmin;  animation-duration: 30s; animation-direction: reverse; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Terminal: centered, sized to fit the iframe while keeping the design's
     680 x 380 feel. On very tall iframes it stays centered thanks to flex. */
  .terminal-wrap {
    width: 100%;
    max-width: 640px;
    aspect-ratio: 680 / 400;
    max-height: 100%;
  }
  .terminal-wrap svg { width: 100%; height: 100%; display: block; }

  .terminal { opacity: 0; transform-box: fill-box; transform-origin: center; animation: termIn 0.9s cubic-bezier(0.22,0.9,0.3,1) 0.1s forwards; }
  @keyframes termIn { from { opacity: 0; transform: translateY(14px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .welcome-box { opacity: 0; animation: fadeIn 0.5s 0.6s forwards; }
  @keyframes fadeIn { to { opacity: 1; } }

  .letter { opacity: 0; transform-box: fill-box; transform-origin: center; animation: letterIn 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  @keyframes letterIn { from { opacity: 0; transform: translateY(-10px) scale(0.82); } to { opacity: 1; transform: translateY(0) scale(1); } }

  .press-line { opacity: 0; animation: fadeIn 0.5s 2.1s forwards; }
  .cursor { opacity: 0; animation: blink 1s steps(2) infinite; animation-delay: 2.4s; }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; opacity: 1 !important; transform: none !important; }
  }
</style>
