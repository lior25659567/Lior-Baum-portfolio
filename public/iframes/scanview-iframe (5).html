* { scrollbar-width: none; -ms-overflow-style: none; }

html, body { overflow: hidden; overscroll-behavior: none; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    min-height: 100vh; min-height: 100dvh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #A8E6E2 0%, #C4EEDA 35%, #B8D8F0 65%, #C8B8F0 100%);
  }
  .stage { width: 100%; height: 100%; }
  .canvas { width: 100%; height: 100%; display: block; }

  /* 2 states */
  .s1,.s2,.s3 { opacity:0; }
  .s1 { animation: s1 13s infinite; }
  .s2 { animation: s2 13s infinite; }
  @keyframes s1 { 0%,46%  { opacity:1 } 50%,100% { opacity:0 } }
  @keyframes s2 { 0%,48%  { opacity:0 } 52%,97%  { opacity:1 } 100%   { opacity:0 } }

  /* Card float */
  .f1 { animation: fy 4s ease-in-out infinite; }
  .f2 { animation: fy 4s ease-in-out infinite; animation-delay:.8s; }
  @keyframes fy { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  /* Teeth selecting one by one */
  .ts1 { animation: tsel 13s infinite; }
  .ts2 { animation: tsel 13s infinite; animation-delay:.4s; }
  .ts3 { animation: tsel 13s infinite; animation-delay:.8s; }
  .ts4 { animation: tsel 13s infinite; animation-delay:1.2s; }
  .ts5 { animation: tsel 13s infinite; animation-delay:1.6s; }

  /* Procedure pills pop in */
  .pill { opacity:0; animation: pp 13s infinite; }
  .pp1{animation-delay:2.0s}.pp2{animation-delay:2.2s}.pp3{animation-delay:2.4s}
  .pp4{animation-delay:2.6s}.pp5{animation-delay:2.8s}.pp6{animation-delay:3.0s}
  .pp7{animation-delay:3.2s}.pp8{animation-delay:3.4s}.pp9{animation-delay:3.6s}
  @keyframes pp { 0%,12%{opacity:0;transform:scale(.85)} 18%,100%{opacity:1;transform:scale(1)} }

  /* Mockup pill active pulse */
  .mock-active { animation: mockP 1.8s ease-in-out infinite; }
  @keyframes mockP { 0%,100%{opacity:.9} 50%{opacity:1} }

  /* Slide up */
  .slide { animation: su .5s cubic-bezier(.22,.9,.3,1) both; }
  @keyframes su { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
